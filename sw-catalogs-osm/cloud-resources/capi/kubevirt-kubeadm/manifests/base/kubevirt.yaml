---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: ${cluster_name}
  namespace: ${namespace}
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
      - ${pod_cidr}
    services:
      cidrBlocks:
      - ${service_cidr}
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KubeadmControlPlane
    name: ${cluster_name}-control-plane
    namespace: ${namespace}
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: KubevirtCluster
    name: ${cluster_name}
    namespace: ${namespace}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtCluster
metadata:
  name: ${cluster_name}
  namespace: ${namespace}
spec:
  controlPlaneServiceTemplate:
    metadata:
      annotations:
        # Take the control-plane LoadBalancer IP from the dedicated CAPK pool
        # (capi-lb-pool, autoAssign:false) instead of the management cluster's
        # shared capi-ip-pool. Guarantees a unique, stable endpoint per cluster.
        metallb.io/address-pool: capi-lb-pool
        # Prevents k3s built-in servicelb from creating a svclb DaemonSet that
        # captures port 6443 on the management host, which breaks all CAPI/KubeVirt
        # mutating webhooks and VMI phase transitions.
        svccontroller.k3s.cattle.io/nodelabels: "k3s-capk-lb=disabled"
    spec:
      type: LoadBalancer
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtMachineTemplate
metadata:
  name: ${cluster_name}-control-plane
  namespace: ${namespace}
spec:
  template:
    spec:
      virtualMachineBootstrapCheck:
        checkStrategy: none
      virtualMachineTemplate:
        metadata:
          namespace: ${namespace}
        spec:
          runStrategy: Always
          template:
            spec:
              domain:
                cpu:
                  cores: ${control_plane_cpu_cores}
                devices:
                  disks:
                  - disk:
                      bus: virtio
                    name: containervolume
                  networkInterfaceMultiqueue: true
                resources:
                  requests:
                    memory: ${control_plane_memory}
                    ephemeral-storage: ${control_plane_ephemeral_storage}
              evictionStrategy: External
              volumes:
              - containerDisk:
                  image: ${vm_image}
                name: containervolume
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: ${cluster_name}-control-plane
  namespace: ${namespace}
spec:
  kubeadmConfigSpec:
    clusterConfiguration:
      apiServer:
        # This is the apiserver's own timeout, NOT the kubeadm [api-check] 4m
        # health-wait. The bootstrap kube-proxy static Pod below is what lets that
        # health-wait pass: controlPlaneEndpoint is a kube-proxy-dependent
        # LoadBalancer, so without an early kube-proxy [api-check] times out and
        # the post-init phases (upload-config, mark-control-plane, bootstrap-token,
        # addon) never run -> KCP stuck WaitingForKubeadmInit.
        timeoutForControlPlane: 15m0s
      networking:
        dnsDomain: ${cluster_name}.${namespace}.local
        podSubnet: ${pod_cidr}
        serviceSubnet: ${service_cidr}
    initConfiguration:
      nodeRegistration:
        criSocket: /var/run/containerd/containerd.sock
    joinConfiguration:
      nodeRegistration:
        criSocket: /var/run/containerd/containerd.sock
    # One-shot bootstrap kube-proxy: kubelet starts static Pods before kubeadm's
    # [api-check], and this one bootstraps via the LOCAL apiserver (127.0.0.1, by
    # rewriting admin.conf's server) and programs all Service rules incl the
    # control-plane LoadBalancer -> the endpoint becomes routable -> [api-check]
    # passes -> kubeadm finishes init on its own (incl the standard kube-proxy +
    # CoreDNS addons). postKubeadmCommands then removes it so it doesn't duplicate
    # the addon DaemonSet.
    files:
      - path: /var/lib/kube-proxy-bootstrap/config.conf
        owner: root:root
        permissions: "0644"
        content: |
          apiVersion: kubeproxy.config.k8s.io/v1alpha1
          kind: KubeProxyConfiguration
          bindAddress: 0.0.0.0
          clientConnection:
            kubeconfig: /var/lib/kube-proxy-bootstrap/kubeconfig.conf
          clusterCIDR: ${pod_cidr}
          mode: ""
      - path: /etc/kubernetes/manifests/kube-proxy-bootstrap.yaml
        owner: root:root
        permissions: "0600"
        content: |
          apiVersion: v1
          kind: Pod
          metadata:
            name: kube-proxy-bootstrap
            namespace: kube-system
          spec:
            hostNetwork: true
            priorityClassName: system-node-critical
            tolerations:
              - operator: Exists
            containers:
              - name: kube-proxy
                image: registry.k8s.io/kube-proxy:${kubernetes_version}
                command:
                  - /bin/sh
                  - -c
                  - |
                    until [ -f /etc/kubernetes/admin.conf ]; do sleep 1; done
                    sed 's#server: https://.*#server: https://127.0.0.1:6443#' \
                      /etc/kubernetes/admin.conf > /var/lib/kube-proxy-bootstrap/kubeconfig.conf
                    exec kube-proxy --config=/var/lib/kube-proxy-bootstrap/config.conf
                securityContext:
                  privileged: true
                volumeMounts:
                  - name: kubeadmin
                    mountPath: /etc/kubernetes/admin.conf
                    readOnly: true
                  - name: cfg
                    mountPath: /var/lib/kube-proxy-bootstrap
                  - name: xtables
                    mountPath: /run/xtables.lock
                  - name: modules
                    mountPath: /lib/modules
                    readOnly: true
            volumes:
              - name: kubeadmin
                hostPath: { path: /etc/kubernetes/admin.conf, type: File }
              - name: cfg
                hostPath: { path: /var/lib/kube-proxy-bootstrap, type: DirectoryOrCreate }
              - name: xtables
                hostPath: { path: /run/xtables.lock, type: FileOrCreate }
              - name: modules
                hostPath: { path: /lib/modules, type: Directory }
    preKubeadmCommands:
      # Reliability backstop (base64 to survive Flux var-substitution): a
      # transient systemd service that waits for the local apiserver and, if
      # kubeadm's [api-check] timed out and skipped the post-init phases
      # (upload-config/mark-control-plane/bootstrap-token/addon), completes them
      # so KCP init is deterministic instead of dependent on the timeout.
      - "echo  | base64 -d > /usr/local/bin/capk-ensure-kubeadm-init.sh"
      - "chmod 0755 /usr/local/bin/capk-ensure-kubeadm-init.sh"
      - "systemd-run --unit=capk-ensure-kubeadm-init --description=CAPK-ensure-kubeadm-post-init /usr/local/bin/capk-ensure-kubeadm-init.sh"
    postKubeadmCommands:
      - rm -f /etc/kubernetes/manifests/kube-proxy-bootstrap.yaml
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
      kind: KubevirtMachineTemplate
      name: ${cluster_name}-control-plane
      namespace: ${namespace}
  replicas: ${control_plane_machine_count}
  version: ${kubernetes_version}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtMachineTemplate
metadata:
  name: ${cluster_name}-md-0
  namespace: ${namespace}
spec:
  template:
    spec:
      virtualMachineBootstrapCheck:
        checkStrategy: none
      virtualMachineTemplate:
        metadata:
          namespace: ${namespace}
        spec:
          runStrategy: Always
          template:
            spec:
              domain:
                cpu:
                  cores: ${worker_cpu_cores}
                devices:
                  disks:
                  - disk:
                      bus: virtio
                    name: containervolume
                  networkInterfaceMultiqueue: true
                resources:
                  requests:
                    memory: ${worker_memory}
                    ephemeral-storage: ${worker_ephemeral_storage}
              evictionStrategy: External
              volumes:
              - containerDisk:
                  image: ${vm_image}
                name: containervolume
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: ${cluster_name}-md-0
  namespace: ${namespace}
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs: {}
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: ${cluster_name}-md-0
  namespace: ${namespace}
spec:
  clusterName: ${cluster_name}
  replicas: ${worker_machine_count}
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: ${cluster_name}
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: ${cluster_name}
    spec:
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: ${cluster_name}-md-0
          namespace: ${namespace}
      clusterName: ${cluster_name}
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: KubevirtMachineTemplate
        name: ${cluster_name}-md-0
        namespace: ${namespace}
      version: ${kubernetes_version}
