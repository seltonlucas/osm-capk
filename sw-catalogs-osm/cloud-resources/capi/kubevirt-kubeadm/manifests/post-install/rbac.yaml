#
# Grants the kube-apiserver access to the kubelet API (required for kubectl logs/exec).
# The kube-apiserver authenticates to the kubelet using the certificate with
# CN=kube-apiserver-kubelet-client. kubeadm's default binding uses Group=system:masters
# but that group is not included in this cert, so `kubectl logs` returns Forbidden.
# We bind directly to the User (cert CN) to fix this.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-apiserver-kubelet-client-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:kubelet-api-admin
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: kube-apiserver-kubelet-client
