#
# Patch the CoreDNS ConfigMap to use explicit upstream DNS instead of /etc/resolv.conf.
# In CAPK VMs, /etc/resolv.conf may resolve to the host's local resolver which is
# not reachable from inside the nested cluster's network namespace.
# Using 8.8.8.8/8.8.4.4 ensures DNS resolution works for external names.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
           lameduck 5s
        }
        ready
        kubernetes ${cluster_name}.${namespace}.local in-addr.arpa ip6.arpa {
           pods insecure
           fallthrough in-addr.arpa ip6.arpa
           ttl 30
        }
        prometheus :9153
        forward . 8.8.8.8 8.8.4.4 {
           max_concurrent 1000
        }
        cache 30
        loop
        reload
        loadbalance
    }
