# Dedicated MetalLB IP pool for CAPI KubeVirt cluster control-plane LoadBalancer services.
# This pool (10.7.230.210-10.7.230.220) is separate from the management cluster's own IP
# so each spawned cluster gets a unique, stable LoadBalancer IP instead of sharing the
# management node IP via NodePort. MetalLB assigns an IP before kubeadm runs, so CAPI
# can embed the correct endpoint in certificates from the start.
#
# Apply once on the management cluster:
#   kubectl apply -f capi-lb-pool.yaml

---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: capi-lb-pool
  namespace: metallb-system
spec:
  addresses:
  - 10.7.230.210-10.7.230.220

---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: capi-lb-adv
  namespace: metallb-system
spec:
  ipAddressPools:
  - capi-lb-pool
