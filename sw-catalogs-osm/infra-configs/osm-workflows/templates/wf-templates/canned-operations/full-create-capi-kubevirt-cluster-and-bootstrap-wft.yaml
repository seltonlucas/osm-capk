apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: full-create-capi-kubevirt-cluster-and-bootstrap-wft
  namespace: osm-workflows

spec:
  arguments:
    parameters:

    # Fleet repo
    - name: git_fleet_url
    - name: fleet_destination_folder
    - name: git_fleet_cred_secret

    # SW-Catalogs repo
    - name: git_sw_catalogs_url
    - name: sw_catalogs_destination_folder
    - name: git_sw_catalogs_cred_secret

    # Specific parameters - Generic cluster creation
    - name: cluster_kustomization_name
    - name: cluster_name
    - name: node_count
    - name: k8s_version

    ## Specific parameters - CAPI KubeVirt
    - name: control_plane_node_count
      value: "1"
    - name: kubevirt_host
      value: ""
    - name: kubevirt_cp_port
      value: "30445"
    - name: metallb_shared_ip_key
      value: "shared-osm-pool"
    - name: control_plane_cpu_cores
      value: "2"
    - name: control_plane_memory
      value: "4Gi"
    - name: control_plane_ephemeral_storage
      value: "2Gi"
    - name: worker_cpu_cores
      value: "2"
    - name: worker_memory
      value: "4Gi"
    - name: worker_ephemeral_storage
      value: "2Gi"
    - name: vm_image
      value: ""
    - name: pod_cidr
      value: "10.243.0.0/16"
    - name: service_cidr
      value: "10.95.0.0/16"
    - name: cluster_cni
      value: ""
    - name: capk_resources_namespace
      value: "default"

    # Specific parameters - Bootstrap and credentials
    - name: public_key_mgmt
    - name: public_key_new_cluster
    - name: secret_name_private_age_key_for_new_cluster
    - name: key_name_in_secret
      value: "agekey"
    - name: mgmt_project_name
      value: "osm_admin"

    # Advanced parameters - Recommended to keep defaults
    - name: skip_bootstrap
      value: "false"
    - name: mgmt_cluster_name
      value: "_management"
    - name: base_templates_path
      value: "cloud-resources/capi"
    - name: cloned_fleet_folder_name
      value: "fleet-osm"
    - name: cloned_sw_catalogs_folder_name
      value: "sw-catalogs-osm"

    # Debug/dry run?
    - name: debug
      value: "false"
    - name: dry_run
      value: "false"


  entrypoint: create-cluster-and-bootstrap

  templates:
  - name: create-cluster-and-bootstrap
    inputs:
      parameters:
      # Fleet repo
      - name: git_fleet_url
      - name: fleet_destination_folder
      - name: git_fleet_cred_secret
      # SW-Catalogs repo
      - name: git_sw_catalogs_url
      - name: sw_catalogs_destination_folder
      - name: git_sw_catalogs_cred_secret
      # Specific parameters
      - name: cluster_kustomization_name
      - name: cluster_name
      - name: node_count
      - name: k8s_version
      - name: public_key_mgmt
      - name: public_key_new_cluster
      - name: secret_name_private_age_key_for_new_cluster
      - name: key_name_in_secret
      ## CAPI KubeVirt specific parameters
      - name: control_plane_node_count
      - name: kubevirt_host
      - name: kubevirt_cp_port
      - name: metallb_shared_ip_key
      - name: control_plane_cpu_cores
      - name: control_plane_memory
      - name: control_plane_ephemeral_storage
      - name: worker_cpu_cores
      - name: worker_memory
      - name: worker_ephemeral_storage
      - name: vm_image
      - name: pod_cidr
      - name: service_cidr
      - name: cluster_cni
      - name: capk_resources_namespace
      # Other parameters - Recommended to keep defaults
      - name: mgmt_project_name
      - name: skip_bootstrap
      - name: mgmt_cluster_name
      - name: base_templates_path
      - name: cloned_fleet_folder_name
      - name: cloned_sw_catalogs_folder_name
      # Debug/dry run?
      - name: debug
      - name: dry_run

    steps:
    # ------ Preparations for transaction
    - - name: generate-fleet-volume-repo
        templateRef:
          name: k8s-resources-wft
          template: generate-volume
        arguments:
          parameters:
            - name: pvc-size
              value: '100Mi'
      - name: generate-sw-catalogs-volume-repo
        templateRef:
          name: k8s-resources-wft
          template: generate-volume
        arguments:
          parameters:
            - name: pvc-size
              value: '100Mi'
    - - name: clone-fleet
        templateRef:
          name: git-wft
          template: git-clone
        arguments:
          parameters:
          - name: mount_path
            value: "/fleet"
          - name: repo_url
            value: "{{inputs.parameters.git_fleet_url}}"
          - name: destination_folder
            value: "{{inputs.parameters.fleet_destination_folder}}"
          - name: git_cred_secret
            value: "{{inputs.parameters.git_fleet_cred_secret}}"
          - name: git_volume_name
            value: '{{steps.generate-fleet-volume-repo.outputs.parameters.pvc-name}}'
      - name: clone-sw-catalogs
        templateRef:
          name: git-wft
          template: git-clone
        arguments:
          parameters:
          - name: mount_path
            value: "/sw-catalogs"
          - name: repo_url
            value: "{{inputs.parameters.git_sw_catalogs_url}}"
          - name: destination_folder
            value: "{{inputs.parameters.sw_catalogs_destination_folder}}"
          - name: git_cred_secret
            value: "{{inputs.parameters.git_sw_catalogs_cred_secret}}"
          - name: git_volume_name
            value: '{{steps.generate-sw-catalogs-volume-repo.outputs.parameters.pvc-name}}'
    # ------ end of preparations for transaction

    # ------ Transformations
    - - name: create-cluster
        templateRef:
          name: cluster-management-wft
          template: create-capi-kubevirt-cluster
        arguments:
          parameters:
          # Volumes with cloned repos
          - name: fleet_volume_name
            value: '{{steps.generate-fleet-volume-repo.outputs.parameters.pvc-name}}'
          - name: fleet_mount_path
            value: "/fleet"
          - name: sw_catalogs_volume_name
            value: '{{steps.generate-sw-catalogs-volume-repo.outputs.parameters.pvc-name}}'
          - name: sw_catalogs_mount_path
            value: "/sw-catalogs"
          # Specific parameters
          - name: cluster_kustomization_name
            value: "{{inputs.parameters.cluster_kustomization_name}}"
          - name: cluster_name
            value: "{{inputs.parameters.cluster_name}}"
          - name: node_count
            value: "{{inputs.parameters.node_count}}"
          - name: k8s_version
            value: "{{inputs.parameters.k8s_version}}"
          - name: public_key_mgmt
            value: "{{inputs.parameters.public_key_mgmt}}"
          - name: public_key_new_cluster
            value: "{{inputs.parameters.public_key_new_cluster}}"
          - name: secret_name_private_age_key_for_new_cluster
            value: "{{inputs.parameters.secret_name_private_age_key_for_new_cluster}}"
          - name: key_name_in_secret
            value: "{{inputs.parameters.key_name_in_secret}}"
          ## CAPI KubeVirt specific parameters
          - name: control_plane_node_count
            value: "{{inputs.parameters.control_plane_node_count}}"
          - name: kubevirt_host
            value: "{{inputs.parameters.kubevirt_host}}"
          - name: kubevirt_cp_port
            value: "{{inputs.parameters.kubevirt_cp_port}}"
          - name: metallb_shared_ip_key
            value: "{{inputs.parameters.metallb_shared_ip_key}}"
          - name: control_plane_cpu_cores
            value: "{{inputs.parameters.control_plane_cpu_cores}}"
          - name: control_plane_memory
            value: "{{inputs.parameters.control_plane_memory}}"
          - name: control_plane_ephemeral_storage
            value: "{{inputs.parameters.control_plane_ephemeral_storage}}"
          - name: worker_cpu_cores
            value: "{{inputs.parameters.worker_cpu_cores}}"
          - name: worker_memory
            value: "{{inputs.parameters.worker_memory}}"
          - name: worker_ephemeral_storage
            value: "{{inputs.parameters.worker_ephemeral_storage}}"
          - name: vm_image
            value: "{{inputs.parameters.vm_image}}"
          - name: pod_cidr
            value: "{{inputs.parameters.pod_cidr}}"
          - name: service_cidr
            value: "{{inputs.parameters.service_cidr}}"
          - name: cluster_cni
            value: "{{inputs.parameters.cluster_cni}}"
          - name: capk_resources_namespace
            value: "{{inputs.parameters.capk_resources_namespace}}"
          ## Fed with `git_fleet_url` to avoid duplicates
          - name: fleet_repo_url
            value: "{{inputs.parameters.git_fleet_url}}"
          ## Fed with `git_sw_catalogs_url` to avoid duplicates
          - name: sw_catalogs_repo_url
            value: "{{inputs.parameters.git_sw_catalogs_url}}"
          - name: mgmt_project_name
            value: "{{inputs.parameters.mgmt_project_name}}"
          - name: skip_bootstrap
            value: "{{inputs.parameters.skip_bootstrap}}"
          # Other parameters - Recommended to keep defaults
          - name: mgmt_cluster_name
            value: "{{inputs.parameters.mgmt_cluster_name}}"
          - name: base_templates_path
            value: "{{inputs.parameters.base_templates_path}}"
          - name: cloned_fleet_folder_name
            value: "{{inputs.parameters.cloned_fleet_folder_name}}"
          - name: cloned_sw_catalogs_folder_name
            value: "{{inputs.parameters.cloned_sw_catalogs_folder_name}}"
          # Debug?
          - name: debug
            value: "{{inputs.parameters.debug}}"
    # ------ end of transformations

    # ------ Commit transaction
    - - name: push-to-fleet
        templateRef:
          name: git-wft
          template: git-commit-merge-push
        arguments:
          parameters:
          - name: mount_path
            value: "/fleet"
          - name: repo_folder
            value: "{{inputs.parameters.fleet_destination_folder}}"
          - name: git_cred_secret
            value: "{{inputs.parameters.git_fleet_cred_secret}}"
          - name: git_volume_name
            value: '{{steps.generate-fleet-volume-repo.outputs.parameters.pvc-name}}'
          - name: commit_message
            value: "Create CAPI KubeVirt cluster {{inputs.parameters.cluster_kustomization_name}}"
          - name: main_branch
            value: main
          - name: contrib_branch
            value: osm_contrib
          - name: dry_run
            value: "{{inputs.parameters.dry_run}}"
    # ------ end of commit transaction

    # ------ Post-provisioning: copy kubeconfig secret so Flux CNI/postinstall Kustomizations
    #        can reach the new cluster. CAPI creates <cluster_name>-kubeconfig in the CAPI
    #        resources namespace (capk_resources_namespace); the Flux Kustomizations reference
    #        <cluster_kustomization_name>-kubeconfig in managed-resources.
    - - name: wait-and-copy-kubeconfig
        templateRef:
          name: k8s-resources-wft
          template: wait-and-copy-capk-kubeconfig
        arguments:
          parameters:
          - name: cluster_name
            value: "{{inputs.parameters.cluster_name}}"
          - name: cluster_namespace
            value: "{{inputs.parameters.capk_resources_namespace}}"
          - name: source_secret_name
            value: "{{inputs.parameters.cluster_name}}-kubeconfig"
          - name: target_namespace
            value: "managed-resources"
          - name: target_secret_name
            value: "{{inputs.parameters.cluster_kustomization_name}}-kubeconfig"
    # ------ end of post-provisioning
