apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: k8s-resources-wft
  namespace: osm-workflows
spec:
  templates:

  - name: generate-volume
    serviceAccountName: argo
    inputs:
      parameters:
        - name: pvc-size
    resource:
      action: create
      setOwnerReference: true
      manifest: |
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          generateName: pvc-osm-
        spec:
          accessModes: ['ReadWriteOnce']
          resources:
            requests:
              storage: '{{inputs.parameters.pvc-size}}'
    outputs:
      parameters:
        - name: pvc-name
          valueFrom:
            jsonPath: '{.metadata.name}'

  # Wait for a CAPI cluster to reach Provisioned phase, then copy its kubeconfig secret
  # from the CAPI resources namespace (default: "default") into the managed-resources
  # namespace so Flux Kustomizations that target the new cluster can reference it.
  #
  # The argo ServiceAccount must have RBAC to:
  #   get/watch clusters.cluster.x-k8s.io in source_namespace
  #   get secrets in source_namespace
  #   create/update secrets in target_namespace
  - name: wait-and-copy-capk-kubeconfig
    serviceAccountName: argo
    inputs:
      parameters:
      - name: cluster_name
      - name: cluster_namespace
        value: "default"
      - name: source_secret_name
      - name: target_namespace
        value: "managed-resources"
      - name: target_secret_name
      - name: timeout
        value: "30m"
    script:
      image: bitnami/kubectl:latest
      command: [bash]
      source: |
        set -euo pipefail

        CLUSTER="{{inputs.parameters.cluster_name}}"
        NS="{{inputs.parameters.cluster_namespace}}"
        SRC="{{inputs.parameters.source_secret_name}}"
        TGT_NS="{{inputs.parameters.target_namespace}}"
        TGT="{{inputs.parameters.target_secret_name}}"
        TIMEOUT="{{inputs.parameters.timeout}}"

        # Convert timeout (Nm / Ns / N) to an absolute deadline in epoch seconds.
        case "${TIMEOUT}" in
          *m) DEADLINE=$(( $(date +%s) + ${TIMEOUT%m} * 60 )) ;;
          *s) DEADLINE=$(( $(date +%s) + ${TIMEOUT%s} )) ;;
          *)  DEADLINE=$(( $(date +%s) + ${TIMEOUT} )) ;;
        esac

        # 1. Wait for the Cluster object to EXIST. Flux may not have applied the CAPI
        #    manifests yet when this step starts, and `kubectl wait` errors out
        #    immediately (exit 1) on a missing object instead of waiting -> the race
        #    that used to fail this step. Poll for existence first.
        echo "Waiting for Cluster ${CLUSTER} (ns ${NS}) to exist..."
        until kubectl get "cluster/${CLUSTER}" -n "${NS}" >/dev/null 2>&1; do
          if [ "$(date +%s)" -ge "${DEADLINE}" ]; then
            echo "Timed out waiting for Cluster ${CLUSTER} to be created"; exit 1
          fi
          sleep 10
        done

        # 2. Wait for it to reach the Provisioned phase (bounded by remaining time).
        REMAIN=$(( DEADLINE - $(date +%s) )); [ "${REMAIN}" -lt 1 ] && REMAIN=1
        echo "Waiting for ${CLUSTER} to reach Provisioned (up to ${REMAIN}s)..."
        kubectl wait "cluster/${CLUSTER}" -n "${NS}" \
          --for=jsonpath='{.status.phase}'=Provisioned --timeout="${REMAIN}s"

        # 3. Wait for the kubeconfig secret to EXIST (CAPI creates it once the control
        #    plane is up; it can lag the Provisioned phase slightly).
        echo "Waiting for kubeconfig secret ${SRC}..."
        until kubectl get "secret/${SRC}" -n "${NS}" >/dev/null 2>&1; do
          if [ "$(date +%s)" -ge "${DEADLINE}" ]; then
            echo "Timed out waiting for secret ${SRC}"; exit 1
          fi
          sleep 10
        done

        # 4. Copy it into the target namespace for the Flux Kustomizations.
        echo "Copying kubeconfig secret to ${TGT_NS}/${TGT}..."
        kubectl get "secret/${SRC}" -n "${NS}" -o jsonpath='{.data.value}' | base64 -d > /tmp/kubeconfig
        kubectl create secret generic "${TGT}" --from-file=value=/tmp/kubeconfig \
          -n "${TGT_NS}" --dry-run=client -o yaml | kubectl apply -f -

        echo "Done: ${TGT_NS}/${TGT} is ready."
