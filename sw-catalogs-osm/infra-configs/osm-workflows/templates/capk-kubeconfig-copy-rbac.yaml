# RBAC for the 'wait-and-copy-capk-kubeconfig' Argo template (k8s-resources-wft).
# The argo ServiceAccount (in osm-workflows) needs cross-namespace access to:
#   1. Watch CAPI Cluster objects and read the kubeconfig Secret in the CAPI resources
#      namespace (default: "default").
#   2. Create/update the kubeconfig Secret in managed-resources so Flux CNI and
#      postinstall Kustomizations can reference it via kubeConfig.secretRef.
#
# If capk_resources_namespace is changed from "default", add a matching Role + RoleBinding
# in that namespace following the same pattern as 'argo-capk-source-ns' below.

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-capk-source-ns
  namespace: default
rules:
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - clusters
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-capk-source-ns
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-capk-source-ns
subjects:
- kind: ServiceAccount
  name: argo
  namespace: osm-workflows
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-capk-managed-resources
  namespace: managed-resources
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - create
  - update
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-capk-managed-resources
  namespace: managed-resources
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-capk-managed-resources
subjects:
- kind: ServiceAccount
  name: argo
  namespace: osm-workflows
