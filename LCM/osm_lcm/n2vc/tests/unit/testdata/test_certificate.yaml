apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: test-cert
  namespace: osm
spec:
  secretName: test-cert-secret
  privateKey:
    rotationPolicy: Always
    algorithm: ECDSA
    size: 256
  duration: 8760h
  renewBefore: 2208h
  subject:
    organizations:
      - osm
  commonName: osm
  isCA: false
  usages:
    - server auth
  dnsNames:
    - "*.osm"
    - "*.osm.svc"
    - "*.osm.svc.cluster"
    - "*.osm.svc.cluster.local"
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
