workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

include:
  - project: "devops/cicd"
    file: "/templates/osm-base.yml"
    rules:
      - if: '$CI_PIPELINE_SOURCE == "schedule"'

build_job:
  script: echo "Check build progress on Jenkins"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
